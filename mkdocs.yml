site_name: CVOR Anesthesia Reference
site_url: https://dzauski585.github.io
site_author: dz
site_description: Cardiac anesthesia reference for CRNA students

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png

  palette:
    # Light mode
    - scheme: default
      primary: blue-grey
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: black
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.tabs             # top-level section tabs in header
    - navigation.tabs.sticky      # tabs stay visible on scroll
    - navigation.sections         # section headers rendered in sidebar
    - navigation.expand           # expand sidebar sections by default
    - navigation.top              # back-to-top button
    - navigation.indexes          # section folders can have index pages
    - toc.integrate               # TOC in left sidebar alongside nav
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.admonitions

  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/dzauski585/dzauski585.github.io
repo_name: dzauski585/dzauski585.github.io

plugins:
  - search
  - glightbox           # click-to-zoom all images — critical for TEE/echo images
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details    # enables ??? collapsible blocks
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

copyright: >
  Built by dz
  Content for educational use only. Not a substitute for clinical judgment.

nav:
  - Home: index.md
  - CVOR Guide:
    - cvor/index.md
    - CVOR Case Guide: cvor/cv_or_guide.md
    - Structural Heart & EP: cvor/structural_heart.md
    - Intraoperative TEE: cvor/TEE.md
    - Physiology: cvor/cardiac_physiology.md
    - Pharmacology: cvor/CVPharm.md
    - Mechanical Support: cvor/ECMO.md
    - Coagulation: cvor/TEG.md
    - Pericardial Baffle: complications/pericardial_baffle.md
  - Case-Specific Notes:
    - cases/index.md
    - Thoracic Anesthesia: cases/thoracic_review.md
    - OB Anesthesia: cases/ob_review.md
  - Complications:
    - complications/index.md
    - Case Complications: complications/complications.md
    - Thyroid Surgery: complications/Thyroid_Complications.md
    - Cardiac Arrest in OR: complications/cardiac_arrest_OR.md
    - Hyperperfusion Syndrome: complications/hyperperfusion.md
    - Corneal Abrasion: periop/corneal_abrasion.md
  - Periop Reference:
    - Goal Directed Fluids: periop/goal_directed_fluid_therapy.md
    - Perioperative Insulin: periop/Insulin_Periop.md
    - GLP1 / SGLT2: periop/GLP1_SGLT2.md
    - Ultrasound Basics: periop/ultrasound.md
    - TIVA & TCI: cases/TIVA.md
    - Gastric Ultrasound: cases/gastric_US.md
  - Boards Review:
    - Anatomy & Physiology: boards/Anatomy_physiology.md
    - Pharmacology Review: boards/pharmacology_review.md
    - Monitors Review: boards/monitor_review.md
    - Math & Physics: boards/math_physics_review.md
    - Antibiotic Guide: boards/antibiotic_guide.md
    - Cephalosporin Cross-Reactivity: boards/Cephalosporin_Cross.md
    - Stanford Periop Abx: boards/stanford_perioperative_abx_guide.md
    - Stanford Emergency Manual: boards/Stanford_Emergency_Manual.md
  - About: about.md